# Nginx Configuration for PicoClaw Finance Agent
# Place in /etc/nginx/sites-available/picotradeagent
# Then: sudo ln -s /etc/nginx/sites-available/picotradeagent /etc/nginx/sites-enabled/
# Finally: sudo systemctl reload nginx

upstream picotradeagent_backend {
    server 127.0.0.1:5000;
    keepalive 32;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name finance-agent.local localhost;
    
    return 301 https://$server_name$request_uri;
}

# HTTPS Server Block
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name finance-agent.local localhost;
    
    # SSL Configuration
    ssl_certificate /etc/ssl/certs/finance-agent.crt;
    ssl_certificate_key /etc/ssl/private/finance-agent.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'" always;
    
    # Logging
    access_log /var/log/nginx/picotradeagent_access.log combined buffer=32k flush=5s;
    error_log /var/log/nginx/picotradeagent_error.log warn;
    
    # Root location
    root /home/eric/.picoclaw/workspace/picotradeagent;
    
    # Main proxy
    location / {
        # Rate limiting
        limit_req zone=api burst=20 nodelay;
        
        # Proxy settings
        proxy_pass http://picotradeagent_backend;
        proxy_http_version 1.1;
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_set_header Connection "";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 24 4k;
    }
    
    # Health check endpoint (no logging)
    location /health {
        access_log off;
        proxy_pass http://picotradeagent_backend;
    }
    
    # API endpoints with stricter rate limiting
    location /api/ {
        limit_req zone=api_strict burst=10 nodelay;
        
        proxy_pass http://picotradeagent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # Static content caching
    location /static/ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
    }
    
    # Deny direct access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
    }
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=api_strict:10m rate=5r/s;

# PicoClaw Finance Router Rules
routing:
  patterns:
    # Status/Monitoring
    - intent: "check_status"
      keywords: ["status", "portfolio", "pnl", "equity"]
      tool: "engine_status"
      confidence: 0.95

    - intent: "check_positions"
      keywords: ["positions", "holdings", "open"]
      tool: "engine_positions"
      confidence: 0.95

    - intent: "check_trades"
      keywords: ["trades", "history", "executed"]
      tool: "engine_trade_history"
      confidence: 0.90

    # Control
    - intent: "pause_trading"
      keywords: ["pause", "stop", "halt"]
      tool: "engine_pause"
      confidence: 0.95

    - intent: "resume_trading"
      keywords: ["resume", "continue", "start"]
      tool: "engine_resume"
      confidence: 0.95

    - intent: "reset_portfolio"
      keywords: ["reset", "clear"]
      tool: "engine_reset_portfolio"
      confidence: 0.90

    - intent: "set_focus"
      keywords: ["focus on", "theme", "watchlist"]
      tool: "engine_set_focus"
      confidence: 0.85

    # Analysis
    - intent: "analyze_symbol"
      keywords: ["analyze", "what about", "signal"]
      routing: "orchestrator_full_pipeline"
      confidence: 0.85

fallback:
  strategy: "delegate_to_orchestrator_prompt"

version: '3.8'

services:
  # Main Finance Agent Service
  picotradeagent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picotradeagent
    restart: unless-stopped
    environment:
      FLASK_ENV: production
      PICOTRADEAGENT_ENV: production
      PYTHONUNBUFFERED: 1
    ports:
      - "5000:5000"
    volumes:
      - ./finance_service/storage:/app/finance_service/storage
      - ./logs:/app/logs
    networks:
      - picotradeagent-net
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Streamlit Dashboard UI
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: picotradeagent-dashboard
    restart: unless-stopped
    environment:
      PYTHONUNBUFFERED: 1
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_CLIENT_LOGGER_LEVEL: "info"
      API_BASE_URL: "http://picotradeagent:5000"
    ports:
      - "8501:8501"
    volumes:
      - ./finance_service/ui:/app/finance_service/ui:ro
      - ./tests:/app/tests:ro
    networks:
      - picotradeagent-net
    depends_on:
      - picotradeagent
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache (Optional)
  redis:
    image: redis:7-alpine
    container_name: picotradeagent-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - picotradeagent-net
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: picotradeagent-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./picotradeagent-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl/certs:/etc/nginx/ssl/certs:ro
      - ./ssl/private:/etc/nginx/ssl/private:ro
    networks:
      - picotradeagent-net
    depends_on:
      - picotradeagent
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: picotradeagent-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - picotradeagent-net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: picotradeagent-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: 'redis-datasource'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - picotradeagent-net
    depends_on:
      - prometheus
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Adminer for Database Management (Optional)
  adminer:
    image: adminer:latest
    container_name: picotradeagent-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - picotradeagent-net
    depends_on:
      - picotradeagent

networks:
  picotradeagent-net:
    driver: bridge

volumes:
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
